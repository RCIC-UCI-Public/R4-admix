---
# need EPEL for gsl-devel on Rocky 10
enablerepo: "epel"
system:
  - bzip2-devel
  - curl-devel
  - freetype-devel
  - !OScmp "<,10,java-1.8.0-openjdk-devel,"
  - libjpeg-turbo-devel
  - libpng-devel
  - libX11-devel
  - libX11-devel
  - libxml2-devel
  - libXt-devel
  - mariadb-devel
  - mesa-libGLU-devel
  - postgresql-devel
  - readline-devel
  - unixODBC-devel
  - !OScmp "<,10,xorg-x11-server-devel,xorg-x11-server-Xwayland-devel"
  - !OScmp ">=,10,xorg-x11-xtrans-devel,"
  - xz-devel
  - icu
  - libicu-devel
  - gsl-devel
  - tcl-devel
  - tk-devel
  - pcre2-devel
  - perl-Unicode-Map
  - perl-Jcode
  - perl-Spreadsheet-WriteExcel
  - cairo-devel
  - pango-devel
  - freetype-devel
  - fribidi-devel
  - harfbuzz-devel
  - libpq-devel
basebuild:
  - R
  - R-module
  - rstudio
  - rstudio-module
  - GenomeInfoDbData
  - tmvnsim
bootstrap0:
bootstrap1:
bootstrap:
  - "{{bootstrap0}}"
  - "{{bootstrap1}}"
build:
manifest:
  - "{{bootstrap}}"
  - "{{build}}"
parallel:
  sets: 6
sets:
  - "404"
  - "412"
  - "422"
  - "433"
  - "442"
  - "452"
