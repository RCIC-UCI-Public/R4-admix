    - R_{{Rversion}}-magrittr
    - R_{{Rversion}}-Rcpp
    - R_{{Rversion}}-timeDate
    - R_{{Rversion}}-tseries
    - R_{{Rversion}}-urca
    - R_{{Rversion}}-withr
    - R_{{Rversion}}-zoo
    - R_{{Rversion}}-RcppArmadillo
    - R_{{Rversion}}-cli
    - R_{{Rversion}}-gtable
    - R_{{Rversion}}-isoband
    - R_{{Rversion}}-lifecycle
    - R_{{Rversion}}-rlang
    - R_{{Rversion}}-S7
    - R_{{Rversion}}-scales
    - R_{{Rversion}}-vctrs
    - R_{{Rversion}}-quadprog
    - R_{{Rversion}}-quantmod
    - R_{{Rversion}}-jsonlite
    - R_{{Rversion}}-glue
    - R_{{Rversion}}-cpp11
    - R_{{Rversion}}-xts
    - R_{{Rversion}}-TTR
    - R_{{Rversion}}-curl
