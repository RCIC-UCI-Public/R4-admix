
!include common.yaml
---
- package: R module tseries
  name: tseries
  rpkgname: tseries
  sversion: "{{versions.tseries}}"
  subversion: "{{versions.tseries_subversion}}"
  version: "{{sversion}}.{{subversion}}"
  baseurl: https://cran.r-project.org/src/contrib
  src_tarball: "{{rpkgname}}_{{sversion}}-{{subversion}}.{{extension}}"
  vendor_source: "{{baseurl}}/{{rpkgname}}_{{sversion}}-{{subversion}}.{{extension}}"
  description: >
    {{rpkgname}} version {{sversion}}-{{subversion}} for R version {{Rversion}}.
  requires:
    - R_{{Rversion}}
    - R_{{Rversion}}-quadprog
    - R_{{Rversion}}-zoo
    - R_{{Rversion}}-quantmod
    - R_{{Rversion}}-jsonlite
    - R_{{Rversion}}-xts
    - R_{{Rversion}}-TTR
    - R_{{Rversion}}-curl
