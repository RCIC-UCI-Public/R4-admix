
!include common.yaml
---
- package: R module hdf5r
  name: hdf5r
  rpkgname: hdf5r
  version: "{{versions.hdf5r}}"
  baseurl: https://cran.r-project.org/src/contrib
  src_tarball: "{{rpkgname}}_{{version}}.{{extension}}"
  vendor_source: "{{baseurl}}/{{rpkgname}}_{{version}}.{{extension}}"
  requires:
    - R_{{Rversion}}
    - R_{{Rversion}}-R6
    - R_{{Rversion}}-bit64
    - R_{{Rversion}}-bit
    - hdf5_{{versions.hdf5}}_{{compiler}}_{{compiler_version}}
  addfile: hdf5r-{{version}}.patch
  build:
     modules:
      - R/{{Rversion}}
      - hdf5/{{versions.hdf5}}/{{compiler}}.{{compiler_version}} 
  install:
     makeinstall: >
       tar xzvf {{src_tarball}};
       cd hdf5r; 
       patch -p1 < ../{{addfile}};
       if [[ "{{compiler_version}}" > "15" ]]; then export export CFLAGS="-Wno-error=implicit-function-declaration"; fi;
       autoreconf;
       mkdir -p $(ROOT)/{{libpath}};
       R CMD INSTALL -l $(ROOT)/{{libpath}} .
  release: 2
